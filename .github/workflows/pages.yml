name: Deploy CEViChE Static

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'web/**'
      - 'models/**'
      - 'validation/**'
      - '.github/workflows/pages.yml'
      - '.gitignore'
      - 'README.md'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Test
        run: npm run test:run
        working-directory: web

      - name: Type check
        run: npm run typecheck
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Verify model files in artifact
        run: |
          test -f web/dist/models/achilles.csv
          test -f web/dist/models/ctrp.csv

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
